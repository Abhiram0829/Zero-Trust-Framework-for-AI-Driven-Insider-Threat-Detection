<!DOCTYPE html>
<html>
<head>
    <title>Zero Trust UEBA Dashboard</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            margin: 0;
            padding: 0;
            color: #e5e7eb;
        }

        .header {
            background: #020617;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #1e293b;
        }

        .header h1 {
            margin: 0;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .header h2 {
            margin: 5px 0;
            font-weight: 400;
            color: #cbd5f5;
        }

        .container {
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: #020617;
            border-radius: 16px;
            padding: 40px;          /* more inner space */
            width: 100%;           
            box-shadow: 0 0 20px rgba(56,189,248,0.15);
            
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            background: #0f172a;
            color: #38bdf8;
            font-weight: 600;
            border-bottom: 2px solid #1e293b;
        }

        td {
            background: #020617;
            border-bottom: 1px solid #1e293b;
            color: #e5e7eb;
        }

        tr:hover td {
            background: #0f172a;
            transition: 0.3s;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHANDIGARH UNIVERSITY</h1>
        <h2>Final Year Project</h2>
        <h2>Zero Trust Insider Threat Detection Dashboard</h2>
    </div>

    <div class="container">
        <div class="card">
            {{ tables|safe }}
        </div>

        <div class="footer">
            UEBA Analytics • Zero Trust Security Model • By Eswar And Abhiram • Supervisor 
Ms. Sheetal Laroiya
        </div>
    </div>

</body>
</html>
